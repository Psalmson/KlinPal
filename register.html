<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klinpal — Set Up Your Account</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:  #0d1b2a;
    --navy2: #162032;
    --navy3: #1e2e42;
    --teal:  #00c9a7;
    --teal2: #00a88a;
    --white: #f4f8ff;
    --gray:  #8a9ab5;
    --gray2: #4a5a72;
    --red:   #ff5757;
    --green: #3dd68c;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--navy); color: var(--white); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }

  .card { background: var(--navy2); border: 1px solid var(--navy3); border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 440px; }
  .logo { font-family: var(--font-head); font-size: 28px; font-weight: 800; color: var(--teal); margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--gray); margin-bottom: 32px; }

  /* MODE TABS */
  .tabs { display: flex; background: var(--navy3); border-radius: 8px; padding: 4px; gap: 2px; margin-bottom: 28px; }
  .tab { flex: 1; padding: 8px; border: none; border-radius: 6px; font-family: var(--font-head); font-size: 12px; font-weight: 700; cursor: pointer; background: transparent; color: var(--gray); transition: all 0.15s; }
  .tab.active { background: var(--teal); color: var(--navy); }

  .step { display: none; }
  .step.active { display: block; }

  .field-group { margin-bottom: 18px; }
  .field-label { font-size: 11px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; display: block; }
  .field-input { width: 100%; background: var(--navy3); border: 1px solid var(--gray2); border-radius: var(--radius); padding: 12px 16px; color: var(--white); font-family: var(--font-body); font-size: 15px; outline: none; transition: border-color 0.2s; }
  .field-input:focus { border-color: var(--teal); }
  .field-input.error { border-color: var(--red); }
  .field-note { font-size: 11px; color: var(--gray); margin-top: 6px; }

  .pw-wrap { position: relative; }
  .pw-wrap .field-input { padding-right: 52px; }
  .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--gray); cursor: pointer; font-size: 13px; font-family: var(--font-body); }

  .btn { width: 100%; padding: 14px; background: var(--teal); color: var(--navy); border: none; border-radius: var(--radius); font-family: var(--font-head); font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; margin-top: 4px; }
  .btn:hover { background: var(--teal2); }
  .btn:disabled { background: var(--navy3); color: var(--gray2); cursor: not-allowed; }
  .btn-ghost { background: var(--navy3); color: var(--gray); }
  .btn-ghost:hover { color: var(--white); background: var(--gray2); }

  .error-msg { font-size: 13px; color: var(--red); margin-top: 12px; display: none; text-align: center; }
  .success-wrap { text-align: center; padding: 20px 0; }
  .success-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--green); color: var(--navy); font-size: 28px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .success-title { font-family: var(--font-head); font-size: 22px; font-weight: 800; margin-bottom: 10px; }
  .success-body { font-size: 14px; color: var(--gray); line-height: 1.6; margin-bottom: 24px; }
  .login-link { display: inline-block; background: var(--teal); color: var(--navy); font-family: var(--font-head); font-weight: 700; font-size: 14px; padding: 12px 28px; border-radius: var(--radius); text-decoration: none; }

  .verified-badge { display: flex; align-items: center; gap: 8px; background: rgba(61,214,140,0.1); border: 1px solid rgba(61,214,140,0.2); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--green); margin-bottom: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">klinpal</div>
  <div class="subtitle">Set up your account to get started</div>

  <!-- MODE TABS -->
  <div class="tabs">
    <button class="tab active" onclick="setMode('vendor')">Vendor</button>
    <button class="tab" onclick="setMode('staff')">Staff</button>
    <button class="tab" onclick="setMode('rider')">Rider</button>
  </div>

  <!-- STEP 1: VERIFY IDENTITY -->
  <div class="step active" id="step-verify">
    <div class="field-group" id="slug-group">
      <label class="field-label" id="identifier-label">Laundromat Slug</label>
      <input class="field-input" id="identifier-input" type="text" placeholder="e.g. capperberry" autocomplete="off">
      <div class="field-note" id="identifier-note">Enter the slug Klinpal gave you.</div>
    </div>
    <button class="btn" onclick="verifyIdentity()" id="verify-btn">Continue →</button>
    <div class="error-msg" id="verify-error">We couldn't find your account. Check and try again.</div>
  </div>

  <!-- STEP 2: SET CREDENTIALS -->
  <div class="step" id="step-credentials">
    <div class="verified-badge" id="verified-name">✓ —</div>
    <div class="field-group">
      <label class="field-label">Email Address</label>
      <input class="field-input" id="cred-email" type="email" placeholder="your@email.com" autocomplete="off">
    </div>
    <div class="field-group">
      <label class="field-label" id="cred-pass-label">Password</label>
      <div class="pw-wrap">
        <input class="field-input" id="cred-pass" type="password" placeholder="Min 6 characters">
        <button class="pw-toggle" onclick="togglePw('cred-pass', this)" type="button">Show</button>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Confirm <span id="cred-confirm-label">Password</span></label>
      <div class="pw-wrap">
        <input class="field-input" id="cred-pass-confirm" type="password" placeholder="Re-enter to confirm">
        <button class="pw-toggle" onclick="togglePw('cred-pass-confirm', this)" type="button">Show</button>
      </div>
    </div>
    <button class="btn" onclick="createAccount()" id="create-btn">Create Account</button>
    <button class="btn btn-ghost" onclick="goBack()" style="margin-top:10px">← Back</button>
    <div class="error-msg" id="create-error">Something went wrong. Please try again.</div>
  </div>

  <!-- STEP 3: SUCCESS -->
  <div class="step" id="step-success">
    <div class="success-wrap">
      <div class="success-icon">✓</div>
      <div class="success-title">You're all set!</div>
      <div class="success-body" id="success-body">Your account has been created. You can now log in.</div>
      <a class="login-link" id="login-link" href="/vendor.html">Go to Login →</a>
    </div>
  </div>
</div>

<script>
  var SUPABASE_URL = 'https://mlgdqxqzpzfzndjhywqf.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_TS5uGf7KzLKxeQw8bxDKYw_HwBNNBeA';

  var currentMode   = 'vendor'; // vendor | staff | rider
  var verifiedRow   = null;     // the matched row from DB

  /* ── HELPERS ── */
  function togglePw(id, btn) {
    var el = document.getElementById(id);
    if (el.type === 'password') { el.type = 'text'; btn.textContent = 'Hide'; }
    else { el.type = 'password'; btn.textContent = 'Show'; }
  }

  function showStep(id) {
    document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  function showError(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg || el.textContent;
    el.style.display = 'block';
  }

  function hideError(id) { document.getElementById(id).style.display = 'none'; }

  /* ── MODE ── */
  function setMode(mode) {
    currentMode = mode;
    verifiedRow = null;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    event.target.classList.add('active');

    var labelEl = document.getElementById('identifier-label');
    var noteEl  = document.getElementById('identifier-note');
    var inputEl = document.getElementById('identifier-input');
    var passLbl = document.getElementById('cred-pass-label');
    var confLbl = document.getElementById('cred-confirm-label');

    if (mode === 'vendor') {
      labelEl.textContent = 'Laundromat Slug';
      inputEl.placeholder = 'e.g. capperberry';
      inputEl.type = 'text';
      noteEl.textContent = 'Enter the slug Klinpal gave you.';
      passLbl.textContent = 'Password';
      confLbl.textContent = 'Password';
    } else {
      labelEl.textContent = 'Phone Number';
      inputEl.placeholder = 'e.g. 08012345678';
      inputEl.type = 'tel';
      noteEl.textContent = mode === 'staff'
        ? 'Enter the phone number your vendor registered for you.'
        : 'Enter the phone number Klinpal registered for you.';
      passLbl.textContent = 'PIN';
      confLbl.textContent = 'PIN';
    }

    document.getElementById('identifier-input').value = '';
    hideError('verify-error');
    showStep('step-verify');
  }

  /* ── STEP 1: VERIFY ── */
  function verifyIdentity() {
    var val = document.getElementById('identifier-input').value.trim();
    var btn = document.getElementById('verify-btn');
    hideError('verify-error');

    if (!val) { showError('verify-error', 'Please enter your ' + (currentMode === 'vendor' ? 'slug' : 'phone number')); return; }

    btn.disabled = true; btn.textContent = 'Checking...';

    var table, filter;
    if (currentMode === 'vendor') {
      table  = 'vendors?slug=eq.' + encodeURIComponent(val.toLowerCase()) + '&limit=1&select=id,name,slug,email';
      filter = function(row) { return !row.email; }; // unclaimed if no email
    } else if (currentMode === 'staff') {
      table  = 'vendor_staff?phone=eq.' + encodeURIComponent(val) + '&active=eq.true&limit=1&select=id,name,phone,email';
      filter = function(row) { return !row.email; };
    } else {
      table  = 'drivers?phone=eq.' + encodeURIComponent(val) + '&active=eq.true&limit=1&select=id,name,phone,email';
      filter = function(row) { return !row.email; };
    }

    fetch(SUPABASE_URL + '/rest/v1/' + table, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' }
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!Array.isArray(data) || !data.length) {
          showError('verify-error', 'No account found. Check your ' + (currentMode === 'vendor' ? 'slug' : 'phone number') + ' and try again.');
          return;
        }
        var row = data[0];
        if (!filter(row)) {
          showError('verify-error', 'This account has already been claimed. Contact Klinpal if you need help.');
          return;
        }
        verifiedRow = row;
        document.getElementById('verified-name').textContent = '✓ ' + row.name;
        showStep('step-credentials');
      })
      .catch(function() { showError('verify-error', 'Could not verify. Please try again.'); })
      .finally(function() { btn.disabled = false; btn.textContent = 'Continue →'; });
  }

  /* ── STEP 2: CREATE ACCOUNT ── */
  function createAccount() {
    var email   = document.getElementById('cred-email').value.trim().toLowerCase();
    var pass    = document.getElementById('cred-pass').value;
    var confirm = document.getElementById('cred-pass-confirm').value;
    var btn     = document.getElementById('create-btn');
    hideError('create-error');

    if (!email)          { showError('create-error', 'Enter your email address.'); return; }
    if (!pass)           { showError('create-error', 'Enter a ' + (currentMode === 'vendor' ? 'password' : 'PIN') + '.'); return; }
    if (pass.length < 6) { showError('create-error', (currentMode === 'vendor' ? 'Password' : 'PIN') + ' must be at least 6 characters.'); return; }
    if (pass !== confirm) { showError('create-error', (currentMode === 'vendor' ? 'Passwords' : 'PINs') + ' do not match.'); return; }

    btn.disabled = true; btn.textContent = 'Creating account...';

    // Step 1: Hash password via Edge Function (never stored plain text)
    fetch(SUPABASE_URL + '/functions/v1/hash-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ password: pass })
    })
    .then(function(r) { return r.json(); })
    .then(function(hashResult) {
      if (hashResult.error) { showError('create-error', 'Could not process password. Try again.'); btn.disabled = false; btn.textContent = 'Create Account'; return; }

      // Step 2: Save email + hash to the right table
      var table, body;
      if (currentMode === 'vendor') {
        table = 'vendors?id=eq.' + verifiedRow.id;
        body  = { email: email, password: hashResult.hash };
      } else if (currentMode === 'staff') {
        table = 'vendor_staff?id=eq.' + verifiedRow.id;
        body  = { email: email, pin: hashResult.hash };
      } else {
        table = 'drivers?id=eq.' + verifiedRow.id;
        body  = { email: email, pin: hashResult.hash };
      }

      return fetch(SUPABASE_URL + '/rest/v1/' + table, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=representation' },
        body: JSON.stringify(body)
      })
      .then(function(r) {
        if (!r.ok) { showError('create-error', 'Could not save your account. Try again.'); btn.disabled = false; btn.textContent = 'Create Account'; return; }

        // Success — show login link
        var loginUrl  = currentMode === 'rider' ? '/driver.html' : '/vendor.html';
        var loginText = currentMode === 'rider' ? 'Go to Driver Login →' : 'Go to Vendor Login →';
        document.getElementById('success-body').textContent =
          'Your account is ready. Log in with ' + email + ' on the ' +
          (currentMode === 'rider' ? 'driver' : 'vendor') + ' dashboard.';
        document.getElementById('login-link').href = loginUrl;
        document.getElementById('login-link').textContent = loginText;
        showStep('step-success');
      });
    })
    .catch(function() { showError('create-error', 'Could not create account. Please try again.'); btn.disabled = false; btn.textContent = 'Create Account'; });
  }

    function goBack() {
    verifiedRow = null;
    document.getElementById('cred-email').value        = '';
    document.getElementById('cred-pass').value         = '';
    document.getElementById('cred-pass-confirm').value = '';
    hideError('create-error');
    showStep('step-verify');
  }

  /* ── KEYBOARD ── */
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    var active = document.querySelector('.step.active');
    if (!active) return;
    if (active.id === 'step-verify')       verifyIdentity();
    if (active.id === 'step-credentials')  createAccount();
  });
</script>
</body>
</html>
