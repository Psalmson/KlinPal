<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="images/favicon.svg" type="image/svg+xml">
<title>Klinpal — Rider</title>
<link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#173753;--navy2:#173753;--navy3:#1a4060;
    --teal:#B5DFCA;--teal2:#2C5530;--sky:#5bc4f5;
    --white:#f4f8ff;--gray:#8a9ab5;--gray2:#4a5a72;
    --red:#ff5757;--amber:#ffb347;--green:#3dd68c;
    --font-head:'Inria Serif',serif;--font-body:'Instrument Sans',sans-serif;
    --font-mono:'DM Mono',monospace;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-body);background:var(--navy);color:var(--white);min-height:100vh;}

  /* ── LOGIN ── */
  #login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .login-card{background:var(--navy2);border:1px solid var(--navy3);border-radius:16px;padding:48px 40px;width:100%;max-width:400px;}
  .login-logo{font-family:var(--font-head);font-size:28px;font-weight:800;color:var(--teal);margin-bottom:4px;}
  .login-badge{display:inline-block;background:rgba(181,223,202,0.12);color:var(--teal);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:28px;letter-spacing:1px;text-transform:uppercase;}
  .login-label{font-size:11px;font-weight:500;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block;}
  .login-input{width:100%;background:var(--navy3);border:1px solid var(--gray2);border-radius:var(--radius);padding:12px 16px;color:var(--white);font-family:var(--font-body);font-size:15px;margin-bottom:20px;outline:none;transition:border-color 0.2s;}
  .login-input:focus{border-color:var(--teal);}
  .login-btn{width:100%;background:var(--teal);color:var(--navy);border:none;border-radius:var(--radius);padding:14px;font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;}
  .login-btn:hover{background:var(--teal2);}
  .login-error{color:var(--red);font-size:13px;margin-top:12px;display:none;text-align:center;}

  /* ── APP LAYOUT ── */
  #app{display:none;max-width:600px;margin:0 auto;padding:24px 16px;}
  .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .app-logo{font-family:var(--font-head);font-size:20px;font-weight:800;color:var(--teal);}
  .driver-info{text-align:right;}
  .driver-name{font-size:14px;font-weight:600;color:var(--white);}
  .driver-sub{font-size:11px;color:var(--gray);margin-top:2px;}
  .logout-btn{background:none;border:none;color:var(--gray);font-size:12px;cursor:pointer;margin-top:4px;font-family:var(--font-body);}
  .logout-btn:hover{color:var(--white);}

  /* ── SUMMARY PILLS ── */
  .pills-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
  .pill{background:var(--navy2);border:2px solid var(--navy3);border-radius:var(--radius);padding:14px 10px;cursor:pointer;transition:border-color 0.2s;text-align:center;}
  .pill.active-pending{border-color:var(--amber);}
  .pill.active-notpaid{border-color:var(--red);}
  .pill.active-paid{border-color:var(--green);}
  .pill-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:6px;}
  .pill-label.pending{color:var(--amber);}
  .pill-label.notpaid{color:var(--red);}
  .pill-label.paid{color:var(--green);}
  .pill-count{font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:2px;}
  .pill-amount{font-size:11px;color:var(--gray);}

  /* ── DATE FILTERS ── */
  .date-filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .date-chip{background:var(--navy2);border:1px solid var(--navy3);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--gray);cursor:pointer;font-family:var(--font-body);white-space:nowrap;}
  .date-chip.active{background:rgba(181,223,202,0.12);border-color:var(--teal);color:var(--teal);}
  .date-input{background:var(--navy2);border:1px solid var(--navy3);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--gray);font-family:var(--font-body);outline:none;}
  .date-input:focus{border-color:var(--teal);}

  /* ── SECTION HEADER ── */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .section-title{font-family:var(--font-head);font-size:16px;font-weight:700;}
  .refresh-btn{background:var(--navy3);border:none;border-radius:6px;padding:6px 12px;color:var(--gray);font-size:12px;cursor:pointer;font-family:var(--font-body);}
  .refresh-btn:hover{color:var(--white);}

  /* ── ORDER CARDS ── */
  .order-card{background:var(--navy2);border:1px solid var(--navy3);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
  .order-card-collapsed{padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .order-card-collapsed:hover{background:rgba(255,255,255,0.02);}
  .order-card-left{flex:1;min-width:0;}
  .order-id-tag{font-family:var(--font-mono);font-size:12px;color:var(--teal);margin-bottom:2px;}
  .order-card-meta{font-size:11px;color:var(--gray);margin-top:2px;}
  .order-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
  .order-expand-body{display:none;padding:0 16px 16px;border-top:1px solid var(--navy3);}
  .order-expand-body.open{display:block;}
  .order-section-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray);margin:12px 0 4px;}
  .cust-name{font-size:14px;font-weight:600;margin-bottom:2px;}
  .cust-phone{font-size:12px;color:var(--gray);margin-bottom:6px;}
  .addr-box{font-size:12px;color:var(--gray);background:var(--navy3);border-radius:6px;padding:8px 12px;margin-bottom:8px;line-height:1.5;}
  .items-line{font-size:12px;color:var(--gray);margin-bottom:8px;}
  .earn-line{font-size:12px;color:var(--teal);font-weight:600;margin-bottom:12px;}
  .action-btns{display:grid;gap:8px;}
  .btn-action{border:none;border-radius:8px;padding:14px;font-family:var(--font-head);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;width:100%;}
  .btn-primary{background:var(--teal);color:var(--navy);}
  .btn-primary:hover{background:var(--teal2);}
  .btn-done{background:rgba(61,214,140,0.1);color:var(--green);border:1px solid rgba(61,214,140,0.2);cursor:default;}

  /* ── STATUS BADGES ── */
  .status-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;}
  .s-pending{background:rgba(255,179,71,0.15);color:var(--amber);}
  .s-pickedup{background:rgba(181,223,202,0.15);color:var(--teal);}
  .s-delivered{background:rgba(61,214,140,0.15);color:var(--green);}
  .s-other{background:rgba(138,154,181,0.15);color:var(--gray);}
  .fee-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;}
  .fee-pending{background:rgba(255,179,71,0.15);color:var(--amber);}
  .fee-notpaid{background:rgba(255,87,87,0.15);color:var(--red);}
  .fee-paid{background:rgba(61,214,140,0.15);color:var(--green);}

  /* ── MISC ── */
  .empty-state{text-align:center;padding:48px 20px;color:var(--gray);font-size:14px;}
  .loading-state{text-align:center;padding:48px 20px;color:var(--gray);font-size:14px;}
  .divider{border:none;border-top:1px solid var(--navy3);margin:10px 0;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--teal);color:var(--navy);padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .toast.error{background:var(--red);color:white;}

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    #app{padding:20px 16px;}
    .app-header{flex-wrap:wrap;gap:10px;}
    .pills-wrap{gap:8px;}
    .pill{padding:12px 8px;}
    .pill-count{font-size:20px;}
    .order-card-collapsed{padding:12px 14px;}
    .btn-action{font-size:13px;padding:12px 14px;}
  }
  @media (max-width: 480px) {
    .login-card{padding:36px 24px;margin:0 12px;}
    #app{padding:16px 12px;}
    .pill-count{font-size:18px;}
    .section-title{font-size:14px;}
    .date-chip{font-size:11px;padding:4px 10px;}
    .app-logo{font-size:18px;}
  }
  @media (max-width: 360px) {
    .login-card{padding:28px 16px;margin:0 8px;}
    #app{padding:12px 10px;}
    .pills-wrap{gap:6px;}
    .pill{padding:10px 6px;}
    .pill-label{font-size:9px;}
    .pill-count{font-size:16px;}
  }
  @media (pointer: coarse) {
    .btn-action,.refresh-btn{min-height:44px;}
    .logout-btn{min-height:36px;padding:8px;}
    .order-card-collapsed{min-height:60px;}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">klinpal</div>
    <div class="login-badge">Rider</div>
    <label class="login-label">Email</label>
    <input class="login-input" id="login-email" type="email" placeholder="your@email.com" autocomplete="off">
    <label class="login-label">PIN</label>
    <div style="position:relative">
      <input class="login-input" id="login-pin" type="password" placeholder="Enter your PIN" style="padding-right:48px;margin-bottom:20px">
      <button onclick="togglePin(this)" type="button" style="position:absolute;right:14px;top:38%;transform:translateY(-50%);background:none;border:none;color:var(--gray);cursor:pointer;font-size:13px;padding:0">Show</button>
    </div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error">Invalid credentials. Try again.</div>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <div class="app-logo">klinpal</div>
    <div class="driver-info">
      <div class="driver-name" id="driver-name">—</div>
      <div class="driver-sub" id="driver-phone-display">—</div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px">
        <button class="logout-btn" onclick="showProfile()">My Profile</button>
        <button class="logout-btn" onclick="doLogout()">Sign out</button>
      </div>
    </div>
  </div>

  <!-- SUMMARY PILLS -->
  <div class="pills-wrap">
    <div class="pill" id="pill-pending" onclick="setFilter('pending')">
      <div class="pill-label pending">Pending</div>
      <div class="pill-count" id="pill-pending-count" style="color:var(--amber)">0</div>
      <div class="pill-amount" id="pill-pending-amt">₦0</div>
    </div>
    <div class="pill" id="pill-notpaid" onclick="setFilter('notpaid')">
      <div class="pill-label notpaid">Not Paid</div>
      <div class="pill-count" id="pill-notpaid-count" style="color:var(--red)">0</div>
      <div class="pill-amount" id="pill-notpaid-amt">₦0</div>
    </div>
    <div class="pill" id="pill-paid" onclick="setFilter('paid')">
      <div class="pill-label paid">Paid</div>
      <div class="pill-count" id="pill-paid-count" style="color:var(--green)">0</div>
      <div class="pill-amount" id="pill-paid-amt">₦0</div>
    </div>
  </div>

  <!-- DATE FILTERS -->
  <div class="date-filter-bar">
    <button class="date-chip" id="chip-today"     onclick="setDateFilter('today')">Today</button>
    <button class="date-chip" id="chip-yesterday" onclick="setDateFilter('yesterday')">Yesterday</button>
    <button class="date-chip" id="chip-week"      onclick="setDateFilter('week')">This Week</button>
    <button class="date-chip active" id="chip-all" onclick="setDateFilter('all')">All Time</button>
    <input type="date" id="filter-from" class="date-input" onchange="setDateFilter('range')" title="From">
    <span style="font-size:11px;color:var(--gray)">–</span>
    <input type="date" id="filter-to"   class="date-input" onchange="setDateFilter('range')" title="To">
  </div>

  <div class="section-header">
    <div class="section-title" id="orders-title">All Orders</div>
    <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
  </div>
  <div id="orders-wrap"><div class="loading-state">Loading orders...</div></div>
</div>

<div class="toast" id="toast"></div>

<!-- PROFILE MODAL -->
<div id="profile-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:center;justify-content:center;overflow-y:auto;padding:16px">
  <div style="background:var(--navy2);border:1px solid var(--navy3);border-radius:16px;padding:32px;width:100%;max-width:400px;margin:auto;position:relative">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <div style="font-family:var(--font-head);font-size:18px;font-weight:800">My Profile</div>
      <button onclick="hideProfile()" style="background:none;border:none;color:var(--gray);cursor:pointer;font-size:22px;line-height:1;padding:0 4px">&times;</button>
    </div>

    <div style="margin-bottom:16px">
      <label class="login-label">New Email</label>
      <input class="login-input" id="profile-email" type="email" placeholder="your@email.com" style="margin-bottom:8px">
      <button onclick="updateEmail()" style="background:var(--teal);color:var(--navy);border:none;border-radius:6px;padding:8px 16px;font-family:var(--font-head);font-size:13px;font-weight:700;cursor:pointer">Update Email</button>
      <div style="font-size:11px;color:var(--gray);margin-top:6px">A confirmation link will be sent to your new email.</div>
    </div>

    <div style="border-top:1px solid var(--navy3);padding-top:16px;margin-bottom:16px">
      <label class="login-label">New PIN</label>
      <input class="login-input" id="profile-pin" type="password" placeholder="Enter new PIN" style="margin-bottom:8px">
      <button onclick="updatePin()" style="background:var(--teal);color:var(--navy);border:none;border-radius:6px;padding:8px 16px;font-family:var(--font-head);font-size:13px;font-weight:700;cursor:pointer">Update PIN</button>
    </div>

    <div style="border-top:1px solid var(--navy3);padding-top:16px;margin-bottom:20px">
      <label class="login-label">Phone Number</label>
      <input class="login-input" id="profile-phone" type="tel" placeholder="e.g. 08012345678" style="margin-bottom:8px">
      <button onclick="updatePhone()" style="background:var(--teal);color:var(--navy);border:none;border-radius:6px;padding:8px 16px;font-family:var(--font-head);font-size:13px;font-weight:700;cursor:pointer">Update Phone</button>
    </div>

    <div style="border-top:1px solid var(--navy3);padding-top:16px;margin-bottom:16px">
      <label class="login-label">Bank Details</label>
      <p style="font-size:11px;color:var(--gray);margin-bottom:12px;line-height:1.5">Your account details for receiving payouts. Ensure these are accurate.</p>
      <input class="login-input" id="driver-bank-name" type="text" placeholder="e.g. Fidelity Bank" style="margin-bottom:8px">
      <input class="login-input" id="driver-account-number" type="text" placeholder="e.g. 0123456789" style="margin-bottom:8px">
      <input class="login-input" id="driver-account-name" type="text" placeholder="e.g. Your Full Name" style="margin-bottom:8px">
      <button onclick="updateBankDetails()" style="background:var(--teal);color:var(--navy);border:none;border-radius:6px;padding:8px 16px;font-family:var(--font-head);font-size:13px;font-weight:700;cursor:pointer">Save Bank Details</button>
    </div>

  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  var SUPABASE_URL = KLINPAL_ENV.SUPABASE_URL;
  var SUPABASE_KEY = KLINPAL_ENV.SUPABASE_KEY;
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession:     true,
      autoRefreshToken:   true,
      detectSessionInUrl: false,
      storageKey:         'klinpal-driver-auth'
    }
  });
  var _token = null;

  function clearAuthStorage() {
    Object.keys(localStorage).forEach(function(key) {
      if (key.startsWith('klinpal-')) localStorage.removeItem(key);
    });
  }

  var STATUS_LABELS = {
    'Pending':               'Order received, awaiting pickup',
    'Picked Up':             'Order picked, on the way to laundromat',
    'Delivered to Vendor':   'Delivered to Vendor',
    'Processing':            'Items are being processed/cleaned',
    'Ready':                 'Ready for delivery',
    'Out for Delivery':      'Items collected, on the way to customer',
    'Delivered to Customer': 'Delivered to Customer',
    'Disputed':              'Disputed — under review',
    'Cancelled':             'Cancelled',
  };
  function statusLabel(s) { return STATUS_LABELS[s] || s || 'Unknown'; }

  var currentDriver   = null;
  var allOrders       = [];
  var vendorCache     = {};
  var realtimeChannel = null;
  var expandedCards   = {};   // tracks which order_ids are expanded
  var activeFilter    = 'all'; // 'pending' | 'notpaid' | 'paid' | 'all'
  var dateFilter      = 'all'; // 'today' | 'yesterday' | 'week' | 'range' | 'all'
  var dateFrom        = '';
  var dateTo          = '';

  function sbFetch(path, opts) {
    var token = _token || SUPABASE_KEY;
    var headers = Object.assign(
      { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      (opts && opts.headers) || {}
    );
    var o = Object.assign({}, opts || {}, { headers: headers });
    return fetch(SUPABASE_URL + '/rest/v1/' + path, o);
  }

  function togglePin(btn) {
    var input = document.getElementById('login-pin');
    if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
    else { input.type = 'password'; btn.textContent = 'Show'; }
  }

  /* ── LOGIN ── */
  function doLogin() {
    var email = document.getElementById('login-email').value.trim().toLowerCase();
    var pin   = document.getElementById('login-pin').value.trim();
    var err   = document.getElementById('login-error');
    if (!email || !pin) { err.style.display = 'block'; return; }
    clearAuthStorage();
    sb.auth.signInWithPassword({ email: email, password: pin })
      .then(function(result) {
        if (result.error) { err.style.display = 'block'; return; }
        _token = result.data.session.access_token;
        var userId = result.data.user.id;
        return fetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + userId + '&select=*', {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + _token, 'Content-Type': 'application/json' }
        })
        .then(function(r) { return r.json(); })
        .then(function(profiles) {
          if (!Array.isArray(profiles) || !profiles.length || profiles[0].role !== 'driver') {
            err.style.display = 'block'; _token = null; return;
          }
          return fetch(SUPABASE_URL + '/rest/v1/drivers?email=eq.' + encodeURIComponent(email) + '&active=eq.true&limit=1&select=*', {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + _token, 'Content-Type': 'application/json' }
          })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (!Array.isArray(data) || !data.length) { err.style.display = 'block'; _token = null; return; }
            currentDriver = data[0];
            err.style.display = 'none';
            bootApp(email);
          });
        });
      })
      .catch(function() { err.style.display = 'block'; });
  }

  document.getElementById('login-email').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('login-pin').focus(); });
  document.getElementById('login-pin').addEventListener('keydown',   function(e) { if (e.key === 'Enter') doLogin(); });

  sb.auth.getSession().then(function(res) {
    if (!res.data || !res.data.session) return;
    _token = res.data.session.access_token;
    var userId = res.data.session.user.id;
    var email  = res.data.session.user.email;
    fetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + userId + '&select=*', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + _token, 'Content-Type': 'application/json' }
    }).then(function(r){ return r.json(); }).then(function(profiles){
      if (!Array.isArray(profiles) || !profiles.length || profiles[0].role !== 'driver') return;
      fetch(SUPABASE_URL + '/rest/v1/drivers?email=eq.' + encodeURIComponent(email) + '&active=eq.true&limit=1&select=*', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + _token, 'Content-Type': 'application/json' }
      }).then(function(r){ return r.json(); }).then(function(data){
        if (!Array.isArray(data) || !data.length) return;
        currentDriver = data[0];
        bootApp(email);
      }).catch(function(){});
    }).catch(function(){});
  });

  function bootApp(email) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('driver-name').textContent          = currentDriver.name;
    document.getElementById('driver-phone-display').textContent = currentDriver.phone || email;
    document.getElementById('profile-email').value              = email;
    document.getElementById('profile-phone').value              = currentDriver.phone || '';
    document.getElementById('driver-bank-name').value           = currentDriver.bank_name      || '';
    document.getElementById('driver-account-number').value      = currentDriver.account_number || '';
    document.getElementById('driver-account-name').value        = currentDriver.account_name   || '';
    loadOrders();
    startRealtime();
  }

  function doLogout() {

    _token = null;
    sb.auth.signOut();
    currentDriver = null; allOrders = []; vendorCache = {}; expandedCards = {};
    activeFilter = 'all'; dateFilter = 'all'; dateFrom = ''; dateTo = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';

    document.getElementById('login-pin').value   = '';

  }

  /* ── PROFILE ── */
  function showProfile() { document.getElementById('profile-modal').style.display = 'flex'; }
  function hideProfile() { document.getElementById('profile-modal').style.display = 'none'; }

  function updateEmail() {

  function updatePin() {

  function updatePhone() {
    var phone = document.getElementById('profile-phone').value.trim().replace(/\s+/g,'');
    if (!phone) { showToast('Enter a phone number', true); return; }
    sbFetch('drivers?id=eq.' + currentDriver.id, { method: 'PATCH', body: JSON.stringify({ phone: phone }) })
      .then(function(r) {
        if (r.ok) { currentDriver.phone = phone; document.getElementById('driver-phone-display').textContent = phone; showToast('Phone updated ✓'); }
        else showToast('Update failed', true);
      });
  }

  function updateBankDetails() {
    var bankName = document.getElementById('driver-bank-name').value.trim();
    var acctNum  = document.getElementById('driver-account-number').value.trim();
    var acctName = document.getElementById('driver-account-name').value.trim();
    if (!bankName || !acctNum || !acctName) { showToast('Please fill in all bank detail fields', true); return; }
    sbFetch('drivers?id=eq.' + currentDriver.id, {
      method: 'PATCH',

        currentDriver.bank_name      = bankName;

        showToast('Could not save bank details', true);
      }
    })
    .catch(function() { showToast('Could not save bank details', true); });

  /* ── DATE FILTER ── */
  function setDateFilter(mode) {
    dateFilter = mode;
    ['today','yesterday','week','all'].forEach(function(m) {
      var el = document.getElementById('chip-' + m);
      if (el) el.classList.toggle('active', m === mode);
    });
    if (mode !== 'range') {
      document.getElementById('filter-from').value = '';
      document.getElementById('filter-to').value   = '';
      dateFrom = ''; dateTo = '';
    } else {
      dateFrom = document.getElementById('filter-from').value;
      dateTo   = document.getElementById('filter-to').value;
      ['today','yesterday','week','all'].forEach(function(m) {
        var el = document.getElementById('chip-' + m);
        if (el) el.classList.remove('active');
      });
    }
    renderOrders();
  }

  function orderMatchesDateFilter(o) {
    if (dateFilter === 'all') return true;
    var d = new Date(o.created_at);
    var now = new Date();
    var todayStr = now.toDateString();
    if (dateFilter === 'today') return d.toDateString() === todayStr;
    if (dateFilter === 'yesterday') {
      var yest = new Date(now); yest.setDate(yest.getDate() - 1);
      return d.toDateString() === yest.toDateString();
    }
    if (dateFilter === 'week') {
      var weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
      return d >= weekAgo;
    }
    if (dateFilter === 'range') {
      if (dateFrom && d < new Date(dateFrom)) return false;
      if (dateTo   && d > new Date(dateTo + 'T23:59:59')) return false;
      return true;
    }
    return true;
  }

  /* ── FEE STATE ── */
  // Per-leg fee state for this rider on a given order
  function getRiderFeeState(o) {
    var isPickup   = o.pickup_driver_id   === currentDriver.id;
    var isDelivery = o.delivery_driver_id === currentDriver.id;
    var states = [];

    if (isPickup) {
      // Pickup leg complete when status is Delivered to Vendor or beyond
      var pickupComplete = ['Delivered to Vendor','Processing','Ready','Delivered to Customer'].indexOf(o.status) > -1;
      if (!pickupComplete) {
        states.push('pending');
      } else if (o.pickup_rider_settled) {
        states.push('paid');
      } else {
        states.push('notpaid');
      }
    }
    if (isDelivery) {
      // Delivery leg complete when Delivered to Customer
      var deliveryComplete = o.status === 'Delivered to Customer';
      if (!deliveryComplete) {
        states.push('pending');
      } else if (o.delivery_rider_settled) {
        states.push('paid');
      } else {
        states.push('notpaid');
      }
    }
    // Return the "worst" state: pending > notpaid > paid
    if (states.indexOf('pending')  > -1) return 'pending';
    if (states.indexOf('notpaid')  > -1) return 'notpaid';
    return 'paid';
  }

  function getRiderEarn(o) {
    var earn = 0;
    if (o.pickup_driver_id   === currentDriver.id) earn += Number(o.pickup_rider_fee)   || 0;
    if (o.delivery_driver_id === currentDriver.id) earn += Number(o.delivery_rider_fee) || 0;
    return earn;
  }

  /* ── FILTER PILL ── */
  function setFilter(f) {
    activeFilter = (activeFilter === f) ? 'all' : f; // toggle off if already active
    updatePillActiveState();
    renderOrders();
  }

  function updatePillActiveState() {
    ['pending','notpaid','paid'].forEach(function(f) {
      var el = document.getElementById('pill-' + f);
      if (!el) return;
      el.classList.remove('active-pending','active-notpaid','active-paid');
      if (activeFilter === f) el.classList.add('active-' + f);
    });
  }

  /* ── LOAD ORDERS ── */
  function loadOrders() {
    document.getElementById('orders-wrap').innerHTML = '<div class="loading-state">Loading...</div>';
    sbFetch('orders?or=(pickup_driver_id.eq.' + currentDriver.id + ',delivery_driver_id.eq.' + currentDriver.id + ')&order=created_at.desc&select=*')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        allOrders = Array.isArray(data) ? data : [];
        var vendorIds = [];
        allOrders.forEach(function(o) {
          if (o.vendor_id && !vendorCache[o.vendor_id] && vendorIds.indexOf(o.vendor_id) === -1) {
            vendorIds.push(o.vendor_id);
          }
        });
        if (vendorIds.length) {
          return sbFetch('vendors?id=in.(' + vendorIds.join(',') + ')&select=id,name,phone,address')
            .then(function(r) { return r.json(); })
            .then(function(vendors) {
              if (Array.isArray(vendors)) {
                vendors.forEach(function(v) { vendorCache[v.id] = v; });
              }
            });
        }
      })
      .then(function() {
        updatePills();
        renderOrders();
      })
      .catch(function() {
        document.getElementById('orders-wrap').innerHTML = '<div class="empty-state">Could not load orders.</div>';
      });
  }

  /* ── UPDATE PILLS ── */
  function updatePills() {
    var pending = { count: 0, amt: 0 };
    var notpaid = { count: 0, amt: 0 };
    var paid    = { count: 0, amt: 0 };

    allOrders.forEach(function(o) {
      var state = getRiderFeeState(o);
      var earn  = getRiderEarn(o);
      if (state === 'pending')  { pending.count++; pending.amt += earn; }
      if (state === 'notpaid')  { notpaid.count++; notpaid.amt += earn; }
      if (state === 'paid')     { paid.count++;    paid.amt    += earn; }
    });

    document.getElementById('pill-pending-count').textContent = pending.count;
    document.getElementById('pill-pending-amt').textContent   = '\u20A6' + pending.amt.toLocaleString();
    document.getElementById('pill-notpaid-count').textContent = notpaid.count;
    document.getElementById('pill-notpaid-amt').textContent   = '\u20A6' + notpaid.amt.toLocaleString();
    document.getElementById('pill-paid-count').textContent    = paid.count;
    document.getElementById('pill-paid-amt').textContent      = '\u20A6' + paid.amt.toLocaleString();
  }

  /* ── RENDER ORDERS ── */
  var _activeOrderModal = null;

  function renderOrders() {
    var wrap = document.getElementById('orders-wrap');
    var filter = activeFilter || 'all';

    var filtered = allOrders.filter(function(o) {
      var state = getRiderFeeState(o);
      if (filter === 'pending' && state !== 'pending') return false;
      if (filter === 'notpaid' && state !== 'notpaid') return false;
      if (filter === 'paid'    && state !== 'paid')    return false;
      return orderMatchesDateFilter(o);
    });

    if (!filtered.length) {
      wrap.innerHTML = '<div class="empty-state">No orders found.</div>';
      return;
    }

    wrap.innerHTML = filtered.map(function(o) {
      var isPickup   = o.pickup_driver_id   === currentDriver.id;
      var isDelivery = o.delivery_driver_id === currentDriver.id;
      var roleTag    = isPickup && isDelivery ? 'Pickup & Delivery' : isPickup ? 'Pickup' : 'Delivery';
      var stLabel    = statusLabel(o.status);
      var state      = getRiderFeeState(o);
      var stateColor = state === 'paid' ? 'var(--green)' : state === 'notpaid' ? 'var(--red)' : 'var(--amber)';
      var date       = o.created_at ? new Date(o.created_at).toLocaleDateString('en-GB') : '';

      return '<div class="order-card" onclick="openOrderModal(\'' + o.order_id + '\')" style="cursor:pointer">'
        + '<div class="order-card-top">'
        +   '<div><div class="order-id-tag">' + (o.order_id||'\u2014') + '</div><div class="order-date">' + date + '</div></div>'
        +   '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
        +     '<span style="font-size:11px;color:var(--teal);font-weight:600">' + roleTag + '</span>'
        +   '</div>'
        + '</div>'
        + '<div style="font-size:13px;font-weight:500;color:var(--white);margin-bottom:4px">' + stLabel + '</div>'
        + '<div style="font-size:11px;color:' + stateColor + '">' + (state==='paid'?'Commission paid':state==='notpaid'?'Commission unpaid':'In progress') + '</div>'
        + '</div>';
    }).join('');
  }

  function openOrderModal(orderId) {
    var o = allOrders.find(function(x) { return x.order_id === orderId; });
    if (!o) return;
    _activeOrderModal = orderId;
    var isPickup   = o.pickup_driver_id   === currentDriver.id;
    var isDelivery = o.delivery_driver_id === currentDriver.id;

    if (isPickup)   earn += Number(o.pickup_rider_fee)   || 0;
    if (isDelivery) earn += Number(o.delivery_rider_fee) || 0;

    // Format items by category
    var itemsHtml = '';

      var data = typeof ij === 'string' ? (function(){ try{return JSON.parse(ij);}catch(e){return null;} })() : ij;

          itemsHtml += '<div style="font-size:12px;font-weight:700;color:var(--teal);margin:8px 0 4px">' + cat + '</div>';
          var svcs = data[cat];

            svcs.forEach(function(s) {
              itemsHtml += '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--white);padding:3px 0">'
                + '<span>' + s.name + ' \xD7 ' + s.qty + '</span>'
                + (s.price ? '<span style="color:var(--gray)">\u20A6' + (s.price*s.qty).toLocaleString() + '</span>' : '')
                + '</div>';
            });
          }
        });
      } else {
        itemsHtml = '<div style="font-size:12px;color:var(--gray)">' + (o.items||'\u2014') + '</div>';
      }
    } else {
      itemsHtml = '<div style="font-size:12px;color:var(--gray)">' + (o.items||'\u2014') + '</div>';
    }

    // Action button
    var actionBtn = buildActionBtn(o, isPickup, isDelivery);

    var payColor = o.payment_status==='Paid' ? 'var(--green)' : o.payment_status==='Not Paid' ? 'var(--red)' : 'var(--amber)';

    document.getElementById('order-modal-body').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'

      + '<div style="font-size:11px;color:var(--gray);margin-top:2px">' + (o.created_at ? new Date(o.created_at).toLocaleDateString('en-GB') : '') + ' \xB7 ' + roleTag + '</div></div>'
      + '<button onclick="closeOrderModal()" style="background:none;border:none;color:var(--gray);cursor:pointer;font-size:22px;line-height:1;padding:0 4px">&times;</button>'
      + '</div>'

      + '<div style="font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray);margin-bottom:6px">Customer</div>'
      + '<div style="font-size:14px;font-weight:600;margin-bottom:3px">' + (o.customer_name||'\u2014') + '</div>'
      + (o.phone ? '<div class="cust-phone" onclick="copyPhone(\'' + o.phone + '\',this)" style="cursor:pointer;margin-bottom:4px">' + o.phone + ' <span style="font-size:10px;color:var(--teal)">[Copy]</span></div>' : '')
      + '<div class="addr-box" style="margin-bottom:14px">' + (o.address||'\u2014') + '</div>'

      + (vendor ? '<div style="border-top:1px solid var(--navy3);padding-top:14px;margin-bottom:14px">'
        + '<div style="font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray);margin-bottom:6px">Laundromat</div>'

  function closeOrderModal() {
    document.getElementById('order-modal').style.display = 'none';
    _activeOrderModal = null;
  }

  function buildActionBtn(o, isPickup, isDelivery) {
    var isDone = o.status === 'Delivered to Customer' || o.status === 'Cancelled' || o.status === 'Disputed';
    if (isDone) return '<div class="btn-action btn-done">\u2713 ' + statusLabel(o.status) + '</div>';

    if (isPickup && isDelivery) {
      if (o.status === 'Pending')    return '<button class="btn-action btn-primary" onclick="openPickupConfirm()">Confirm Pickup from Customer</button>';
      if (o.status === 'Picked Up')  return '<button class="btn-action btn-primary" onclick="confirmDropoff()">Confirm Drop-off at Laundromat</button>';
      if (o.status === 'Delivered to Vendor' || o.status === 'Processing') return '<div class="btn-action btn-done" style="opacity:0.6">\u2713 Pickup complete \u2014 awaiting processing</div>';
      if (o.status === 'Ready')      return '<button class="btn-action btn-primary" onclick="openCollectionConfirm()">Confirm Collection from Laundromat</button>';
      if (o.status === 'Out for Delivery') return '<button class="btn-action btn-primary" onclick="confirmDelivery()">Confirm Delivered to Customer</button>';
    } else if (isPickup) {
      if (o.status === 'Pending')   return '<button class="btn-action btn-primary" onclick="openPickupConfirm()">Confirm Pickup from Customer</button>';
      if (o.status === 'Picked Up') return '<button class="btn-action btn-primary" onclick="confirmDropoff()">Confirm Drop-off at Laundromat</button>';
      return '<div class="btn-action btn-done">\u2713 Pickup complete</div>';
    } else if (isDelivery) {
      if (o.status === 'Ready')           return '<button class="btn-action btn-primary" onclick="openCollectionConfirm()">Confirm Collection from Laundromat</button>';
      if (o.status === 'Out for Delivery') return '<button class="btn-action btn-primary" onclick="confirmDelivery()">Confirm Delivered to Customer</button>';
      return '<div class="btn-action btn-done" style="opacity:0.5">Awaiting \u2014 ' + statusLabel(o.status) + '</div>';
    }
    return '';
  }

  /* ── HANDOFF CONFIRMATION FLOWS ── */

  function getOrderCats(o) {
    if (o.items_json) {
      var data = typeof o.items_json === 'string' ? (function(){ try{return JSON.parse(o.items_json);}catch(e){return null;} })() : o.items_json;
      if (data) return Object.keys(data).map(function(cat) {
        return { cat: cat, qty: data[cat].reduce(function(a,s){ return a+s.qty; },0) };
      });
    }
    return [{ cat: 'Items', qty: null }];
  }

  function buildCountModal(title, subtitle, refCounts, onSubmit) {
    var html = '<div style="font-family:var(--font-head);font-size:17px;font-weight:800;margin-bottom:8px">' + title + '</div>'
      + '<div style="font-size:12px;color:var(--gray);margin-bottom:16px;line-height:1.5">' + subtitle + '</div>';
    refCounts.forEach(function(rc) {
      html += '<div style="display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;margin-bottom:12px">'
        + '<div><div style="font-size:13px;font-weight:600;color:var(--white)">' + rc.cat + '</div>'
        + (rc.qty !== null ? '<div style="font-size:11px;color:var(--gray)">Expected: ' + rc.qty + ' items</div>' : '')
        + '</div>'
        + '<input type="number" min="0" placeholder="Count" data-cat="' + rc.cat + '" data-ref="' + (rc.qty||0) + '" style="width:80px;background:var(--navy3);border:1px solid var(--gray2);border-radius:8px;padding:8px;color:var(--white);font-family:var(--font-body);font-size:15px;text-align:center;outline:none" oninput="checkConfirmMismatch()">'
        + '</div>';
    });
    html += '<div id="confirm-mismatch" style="display:none;background:rgba(255,87,87,0.1);border:1px solid rgba(255,87,87,0.3);border-radius:8px;padding:12px;margin-bottom:12px">'
      + '<div style="font-size:12px;color:var(--red);font-weight:600;margin-bottom:6px">&#9888; Count mismatch</div>'
      + '<div style="font-size:12px;color:var(--gray);margin-bottom:8px">Counts differ from expected. Add a comment to proceed.</div>'
      + '<textarea id="confirm-override-comment" placeholder="Explain..." style="width:100%;background:var(--navy3);border:1px solid var(--gray2);border-radius:8px;padding:8px;color:var(--white);font-family:var(--font-body);font-size:12px;resize:vertical;min-height:60px;outline:none"></textarea>'
      + '</div>';
    html += '<button class="btn-action btn-primary" id="confirm-submit-btn" onclick="' + onSubmit + '">Confirm</button>';
    return html;
  }

  function checkConfirmMismatch() {
    var inputs = document.querySelectorAll('#confirm-modal-body input[type=number]');
    var mismatch = false;
    inputs.forEach(function(inp) {
      var entered = parseInt(inp.value)||0;
      var ref = parseInt(inp.getAttribute('data-ref'))||0;
      if (ref>0 && entered!==ref) mismatch=true;
    });
    var el = document.getElementById('confirm-mismatch');
    if (el) el.style.display = mismatch ? 'block' : 'none';
    return mismatch;
  }

  function getConfirmCounts() {
    var inputs = document.querySelectorAll('#confirm-modal-body input[type=number]');
    var counts = {}; var allFilled = true;
    inputs.forEach(function(inp) { if (!inp.value.trim()) allFilled = false; counts[inp.getAttribute('data-cat')] = parseInt(inp.value)||0; });
    return allFilled ? counts : null;
  }

  function openConfirmModal(html) {
    document.getElementById('confirm-modal-body').innerHTML = html;
    document.getElementById('confirm-modal').style.display = 'flex';
  }

  function closeConfirmModal() {
    document.getElementById('confirm-modal').style.display = 'none';
  }

  // HANDOFF 1: Pickup from customer
  function openPickupConfirm() {
    var o = allOrders.find(function(x){ return x.order_id === _activeOrderModal; });
    if (!o) return;
    var cats = getOrderCats(o);
    openConfirmModal(buildCountModal(
      'Confirm Pickup',
      'Enter the number of items you are collecting from the customer per category.',
      cats, 'submitPickupConfirm()'
    ));
  }

  function submitPickupConfirm() {
    var counts = getConfirmCounts();
    if (!counts) { showToast('Please enter count for all categories', true); return; }
    var mismatch = checkConfirmMismatch();
    if (mismatch) {
      var comment = document.getElementById('confirm-override-comment').value.trim();
      if (!comment) { showToast('Please add a comment explaining the discrepancy', true); return; }
    }
    var o = allOrders.find(function(x){ return x.order_id === _activeOrderModal; });
    var confirmation = { confirmed_by: currentDriver.name, confirmed_at: new Date().toISOString(), counts: counts, match: !mismatch, override: mismatch, comment: mismatch ? document.getElementById('confirm-override-comment').value.trim() : '' };
    sbFetch('orders?order_id=eq.' + _activeOrderModal, { method: 'PATCH', body: JSON.stringify({ pickup_confirmation: confirmation, status: 'Picked Up', last_updated_by: currentDriver.name }) })
    .then(function(r) {
      if (!r.ok) { showToast('Could not save confirmation', true); return; }
      if (o) o.status = 'Picked Up';
      closeConfirmModal();
      closeOrderModal();
      showToast('Pickup confirmed \u2713');
      loadOrders();
    })
    .catch(function(){ showToast('Could not save', true); });
  }

  // HANDOFF 2: Drop-off at laundromat (simple tap)
  function confirmDropoff() {
    sbFetch('orders?order_id=eq.' + _activeOrderModal, { method: 'PATCH', body: JSON.stringify({ status: 'Delivered to Vendor', last_updated_by: currentDriver.name }) })
    .then(function(r) {
      if (!r.ok) { showToast('Could not update', true); return; }
      var o = allOrders.find(function(x){ return x.order_id === _activeOrderModal; });
      if (o) o.status = 'Delivered to Vendor';
      closeOrderModal();
      showToast('Drop-off confirmed \u2713');
      loadOrders();
    })
    .catch(function(){ showToast('Could not update', true); });
  }

  // HANDOFF 3: Collection from laundromat
  function openCollectionConfirm() {
    var o = allOrders.find(function(x){ return x.order_id === _activeOrderModal; });
    if (!o) return;
    // Use vendor_dispatch_confirmation counts as reference
    var refCounts = [];
    if (o.vendor_dispatch_confirmation) {
      var vdc = typeof o.vendor_dispatch_confirmation === 'string' ? JSON.parse(o.vendor_dispatch_confirmation) : o.vendor_dispatch_confirmation;
      if (vdc && vdc.counts) {
        Object.keys(vdc.counts).forEach(function(cat) { refCounts.push({ cat: cat, qty: vdc.counts[cat] }); });
      }
    }
    if (!refCounts.length) refCounts = getOrderCats(o);
    openConfirmModal(buildCountModal(
      'Confirm Collection',
      'Enter the number of finished items you are collecting from the laundromat.',
      refCounts, 'submitCollectionConfirm()'
    ));
  }

  function submitCollectionConfirm() {
    var counts = getConfirmCounts();
    if (!counts) { showToast('Please enter count for all categories', true); return; }
    var mismatch = checkConfirmMismatch();
    if (mismatch) {
      var comment = document.getElementById('confirm-override-comment').value.trim();
      if (!comment) { showToast('Please add a comment', true); return; }
    }
    var o = allOrders.find(function(x){ return x.order_id === _activeOrderModal; });
    var confirmation = { confirmed_by: currentDriver.name, confirmed_at: new Date().toISOString(), counts: counts, match: !mismatch, override: mismatch, comment: mismatch ? document.getElementById('confirm-override-comment').value.trim() : '' };
    sbFetch('orders?order_id=eq.' + _activeOrderModal, { method: 'PATCH', body: JSON.stringify({ rider_collection_confirmation: confirmation, status: 'Out for Delivery', last_updated_by: currentDriver.name }) })
    .then(function(r) {
      if (!r.ok) { showToast('Could not save confirmation', true); return; }
      if (o) o.status = 'Out for Delivery';
      closeConfirmModal();
      closeOrderModal();
      showToast('Collection confirmed \u2713');
      loadOrders();
    })
    .catch(function(){ showToast('Could not save', true); });
  }

  // HANDOFF 4: Delivery to customer (simple tap + show track URL)
  function confirmDelivery() {
    sbFetch('orders?order_id=eq.' + _activeOrderModal, { method: 'PATCH', body: JSON.stringify({ status: 'Out for Delivery', last_updated_by: currentDriver.name }) })
    .then(function(r) {
      if (!r.ok) { showToast('Could not update', true); return; }
      var o = allOrders.find(function(x){ return x.order_id === _activeOrderModal; });
      // Show track URL for customer to confirm
      var vendor = o ? vendorCache[o.vendor_id] : null;
      var slug   = vendor ? vendor.slug : '';
      var trackUrl = window.location.origin + '/track?vendor=' + slug;
      document.getElementById('order-modal-action').innerHTML =
        '<div style="background:var(--navy3);border-radius:8px;padding:14px;text-align:center">'
        + '<div style="font-size:12px;color:var(--gray);margin-bottom:8px">Ask customer to confirm receipt at:</div>'
        + '<div style="font-family:var(--font-mono);font-size:13px;color:var(--teal);word-break:break-all;margin-bottom:10px">' + trackUrl + '</div>'
        + '<button onclick="navigator.clipboard.writeText(\"' + trackUrl + '\")" style="background:var(--navy2);border:1px solid var(--gray2);border-radius:6px;padding:6px 14px;font-size:12px;color:var(--gray);cursor:pointer;font-family:var(--font-body)">Copy Link</button>'
        + '</div>';
      loadOrders();
    })
    .catch(function(){ showToast('Could not update', true); });
  }

  function updateStatus(orderId, newStatus) {
    var order = allOrders.find(function(o) { return o.order_id === orderId; });
    if (order) { order.status = newStatus; }
    renderOrders();
    sbFetch('orders?order_id=eq.' + orderId, {
      method: 'PATCH',
      body: JSON.stringify({ status: newStatus, last_updated_by: currentDriver.name }),
    })
    .then(function(r) {
      if (r.ok) { showToast('Status updated \u2713'); updateEarnings(); }
      else showToast('Update failed', true);
    })
    .catch(function() { showToast('Could not update', true); });
  }


  /* ── COPY PHONE ── */
  function copyPhone(phone, el) {
    if (!phone) return;
    navigator.clipboard.writeText(phone).then(function() {
      var span = el.querySelector('span');
      if (span) { span.textContent = '[Copied!]'; setTimeout(function() { span.textContent = '[Copy]'; }, 2000); }
    }).catch(function() {});
  }

  /* ── REALTIME ── */
  function startRealtime() {
    if (realtimeChannel) stopRealtime();
    realtimeChannel = sb.channel('driver-' + currentDriver.id)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders', filter: 'pickup_driver_id=eq.' + currentDriver.id }, function(payload) {
        handleRealtimePayload(payload);
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders', filter: 'delivery_driver_id=eq.' + currentDriver.id }, function(payload) {
        handleRealtimePayload(payload);
      })
      .subscribe();
  }

  function handleRealtimePayload(payload) {
    if (payload.eventType === 'INSERT') {
      if (!allOrders.find(function(o) { return o.id === payload.new.id; })) {
        allOrders.unshift(payload.new);
        showToast('New order assigned!');
      }
    } else if (payload.eventType === 'UPDATE') {
      var idx = allOrders.findIndex(function(o) { return o.id === payload.new.id; });
      if (idx > -1) allOrders[idx] = payload.new; else allOrders.unshift(payload.new);
    } else if (payload.eventType === 'DELETE') {
      allOrders = allOrders.filter(function(o) { return o.id !== payload.old.id; });
    }
    updatePills();
    renderOrders();
  }

  function stopRealtime() {
    if (realtimeChannel) { realtimeChannel.unsubscribe(); realtimeChannel = null; }
  }

  function showToast(msg, isError) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }
</script>

<!-- ORDER DETAIL MODAL -->
<div id="order-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:center;justify-content:center;overflow-y:auto;padding:16px">
  <div style="background:var(--navy2);border:1px solid var(--navy3);border-radius:16px;padding:24px;width:100%;max-width:440px;margin:auto">
    <div id="order-modal-body"></div>
  </div>
</div>

<!-- HANDOFF CONFIRMATION MODAL -->
<div id="confirm-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:600;align-items:center;justify-content:center;overflow-y:auto;padding:16px">
  <div style="background:var(--navy2);border:1px solid var(--navy3);border-radius:16px;padding:24px;width:100%;max-width:400px;margin:auto">
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
      <button onclick="closeConfirmModal()" style="background:none;border:none;color:var(--gray);cursor:pointer;font-size:22px;line-height:1;padding:0 4px">&times;</button>
    </div>
    <div id="confirm-modal-body"></div>
  </div>
</div>

</body>
</html>
